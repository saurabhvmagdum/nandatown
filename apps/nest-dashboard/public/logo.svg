<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <rect width="512" height="512" rx="96" fill="#1C1917"/>
  <g transform="translate(256,256)">
    <!-- Outer ring: network connections -->
    <circle cx="0" cy="0" r="180" stroke="#8B0000" stroke-width="3" fill="none" opacity="0.25"/>
    <circle cx="0" cy="0" r="140" stroke="#8B0000" stroke-width="2" fill="none" opacity="0.15"/>
    <!-- Network nodes -->
    <circle cx="0" cy="-180" r="12" fill="#8B0000"/>
    <circle cx="155.9" cy="-90" r="10" fill="#8B0000" opacity="0.8"/>
    <circle cx="155.9" cy="90" r="10" fill="#8B0000" opacity="0.8"/>
    <circle cx="0" cy="180" r="12" fill="#8B0000"/>
    <circle cx="-155.9" cy="90" r="10" fill="#8B0000" opacity="0.8"/>
    <circle cx="-155.9" cy="-90" r="10" fill="#8B0000" opacity="0.8"/>
    <!-- Connection lines between nodes -->
    <line x1="0" y1="-180" x2="155.9" y2="-90" stroke="#8B0000" stroke-width="1.5" opacity="0.3"/>
    <line x1="155.9" y1="-90" x2="155.9" y2="90" stroke="#8B0000" stroke-width="1.5" opacity="0.3"/>
    <line x1="155.9" y1="90" x2="0" y2="180" stroke="#8B0000" stroke-width="1.5" opacity="0.3"/>
    <line x1="0" y1="180" x2="-155.9" y2="90" stroke="#8B0000" stroke-width="1.5" opacity="0.3"/>
    <line x1="-155.9" y1="90" x2="-155.9" y2="-90" stroke="#8B0000" stroke-width="1.5" opacity="0.3"/>
    <line x1="-155.9" y1="-90" x2="0" y2="-180" stroke="#8B0000" stroke-width="1.5" opacity="0.3"/>
    <!-- Cross connections -->
    <line x1="0" y1="-180" x2="0" y2="180" stroke="#8B0000" stroke-width="1" opacity="0.15"/>
    <line x1="-155.9" y1="-90" x2="155.9" y2="90" stroke="#8B0000" stroke-width="1" opacity="0.15"/>
    <line x1="-155.9" y1="90" x2="155.9" y2="-90" stroke="#8B0000" stroke-width="1" opacity="0.15"/>
  </g>
  <!-- Letter N -->
  <text x="256" y="290" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-weight="800" font-size="200" fill="white" letter-spacing="-8">N</text>
</svg>
