<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin review · NANDA Town Showcase</title>
<meta name="robots" content="noindex">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Hind:wght@400;500;600&display=swap');
  :root {
    --ink:#14110f; --paper:#fff7ec; --paper-2:#fdeed6; --card:#fffdf8;
    --saffron:#ff7a1a; --marigold:#ffb703; --indigo:#2f2a8f; --indigo-soft:#e8e6fa;
    --green:#138a4f; --teal:#0d8a8a; --pink:#d6336c; --muted:#6e655c;
    --line:#ecdcc4; --line-2:#e0cfb3;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body {
    font-family:'Hind',sans-serif; background:var(--paper);
    background-image:
      radial-gradient(circle at 12% 8%, rgba(255,183,3,.16), transparent 38%),
      radial-gradient(circle at 88% 92%, rgba(47,42,143,.10), transparent 40%);
    color:var(--ink); line-height:1.55; -webkit-font-smoothing:antialiased;
    padding:0 16px 70px; overflow-x:hidden;
  }
  .wrap { max-width:760px; margin:0 auto; }
  .toptrim { height:8px; margin:0 -16px 0; background:repeating-linear-gradient(90deg, var(--saffron) 0 26px, var(--marigold) 26px 52px, var(--indigo) 52px 78px, var(--teal) 78px 104px); opacity:.9; }
  .backlink { display:inline-block; margin-top:20px; font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); text-decoration:none; }
  .backlink:hover { color:var(--ink); }
  header { padding:22px 0 12px; }
  .kicker { font-family:'JetBrains Mono',monospace; font-size:11.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--pink); display:inline-block; border:1.5px solid var(--pink); padding:6px 12px; border-radius:4px; margin-bottom:16px; }
  h1 { font-family:'Sora',sans-serif; font-size:clamp(26px,6vw,38px); line-height:1.08; font-weight:800; letter-spacing:-.025em; margin-bottom:10px; }
  .sub { font-size:15px; color:var(--muted); max-width:560px; }

  .card { background:var(--card); border:1.5px solid var(--line-2); border-radius:18px; padding:20px; margin-top:16px; box-shadow:0 18px 40px -32px rgba(20,17,15,.5); }
  .flabel { font-family:'JetBrains Mono',monospace; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:var(--muted); display:block; margin-bottom:6px; }
  input[type=password] { width:100%; font-family:'JetBrains Mono',monospace; font-size:14px; background:#fff; border:1.5px solid var(--line-2); border-radius:11px; padding:11px 13px; outline:none; }
  input[type=password]:focus { border-color:var(--saffron); }
  .row { display:flex; gap:10px; align-items:center; margin-top:12px; flex-wrap:wrap; }
  .btn { font-family:'Sora',sans-serif; font-weight:700; font-size:14px; border:none; border-radius:100px; padding:10px 20px; cursor:pointer; transition:transform .13s ease; }
  .btn:hover { transform:translateY(-1px); }
  .btn-solid { background:var(--ink); color:var(--paper); }
  .btn-ok { background:var(--green); color:#fff; }
  .btn-no { background:transparent; color:var(--pink); border:1.5px solid var(--pink); }
  .btn[disabled] { opacity:.45; pointer-events:none; }
  .status { font-family:'JetBrains Mono',monospace; font-size:12px; color:var(--muted); }
  .status.err { color:var(--pink); }
  .status.ok { color:var(--green); }

  .pend { border:1.5px solid var(--line-2); border-radius:14px; padding:15px 16px; margin-top:12px; background:var(--paper); }
  .pend .top { display:flex; justify-content:space-between; gap:10px; align-items:baseline; flex-wrap:wrap; }
  .pend .nm { font-family:'Sora',sans-serif; font-weight:800; font-size:16.5px; }
  .pend .id { font-family:'JetBrains Mono',monospace; font-size:10.5px; color:var(--muted); }
  .pend .by { font-family:'JetBrains Mono',monospace; font-size:11.5px; color:var(--muted); margin:2px 0 8px; }
  .pend .desc { font-size:14px; color:#3a342e; }
  .pend .link { font-family:'JetBrains Mono',monospace; font-size:12px; word-break:break-all; margin-top:8px; }
  .pend .link a { color:var(--indigo); }
  .pend pre { font-family:'JetBrains Mono',monospace; font-size:11.5px; background:#f3e7d6; border-radius:9px; padding:9px 11px; margin-top:8px; white-space:pre-wrap; max-height:200px; overflow:auto; }
  .tbadge { font-family:'JetBrains Mono',monospace; font-size:10px; letter-spacing:.08em; text-transform:uppercase; padding:2px 8px; border-radius:100px; background:var(--indigo-soft); color:var(--indigo); }
  .checkline { display:flex; gap:8px; align-items:center; margin-top:10px; font-size:13px; color:var(--muted); }
  .hide { display:none !important; }
</style>
</head>
<body>
<div class="toptrim"></div>
<div class="wrap">
  <a class="backlink" href="/showcase">&larr; Public showcase</a>

  <header>
    <span class="kicker">Admin · review queue</span>
    <h1>Approve showcase submissions.</h1>
    <p class="sub">Submissions are stored in the team's Google Drive. Approved entries appear on the public showcase immediately, and optionally in the NANDA Town skills registry.</p>
  </header>

  <div class="card" id="login">
    <span class="flabel">Admin key</span>
    <input type="password" id="key" placeholder="Paste the admin key">
    <div class="row">
      <button class="btn btn-solid" id="loginbtn" type="button">Load the review queue</button>
      <span class="status" id="loginstatus"></span>
    </div>
  </div>

  <div id="queue" class="hide">
    <div class="card">
      <div class="row" style="margin-top:0">
        <span class="status" id="qcount"></span>
        <button class="btn btn-solid" id="refreshbtn" type="button" style="margin-left:auto">Refresh</button>
        <button class="btn btn-no" id="logoutbtn" type="button">Log out</button>
      </div>
      <div id="list"></div>
    </div>
  </div>
</div>

<script>
// The review queue lives in a Google Sheet in the NANDA Town team's Drive,
// served by an Apps Script web app. POSTs use text/plain to avoid CORS
// preflight, which Apps Script web apps do not answer.
const BACKEND = '/api/showcase';
let KEY = sessionStorage.getItem('nanda_admin_key') || '';

function esc(s) { return String(s || '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
const $ = id => document.getElementById(id);

async function apiGet(params) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 30000);
  try {
    const r = await fetch(BACKEND + '?' + params, { signal: ctrl.signal });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    return data;
  } finally { clearTimeout(t); }
}

async function apiPost(body) {
  const ctrl = new AbortController();
  const t = setTimeout(() => ctrl.abort(), 60000);
  try {
    const r = await fetch(BACKEND, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify(body),
      signal: ctrl.signal,
    });
    const data = await r.json();
    if (data.error) throw new Error(data.error);
    return data;
  } finally { clearTimeout(t); }
}

function pendCard(e) {
  const linkRow = e.url ? '<div class="link"><a href="' + esc(e.url) + '" target="_blank" rel="noopener">' + esc(e.url) + '</a></div>' : '';
  const contentRow = e.content ? '<pre>' + esc(e.content) + '</pre>' : '';
  const epRow = e.endpoints ? '<pre>' + esc(e.endpoints) + '</pre>' : '';
  return '<div class="pend" id="pend-' + esc(e.id) + '">' +
    '<div class="top"><span class="nm">' + esc(e.name) + '</span><span class="id">' + esc(e.id) + ' · ' + esc(e.submitted_at || '') + '</span></div>' +
    '<div class="by">by ' + esc(e.author) + ' · ' + esc(e.contributor_path) + ' · <span class="tbadge">' + esc(e.submission_type) + '</span></div>' +
    '<div class="desc">' + esc(e.description) + '</div>' +
    linkRow + contentRow + epRow +
    '<label class="checkline"><input type="checkbox" id="town-' + esc(e.id) + '" checked> Also register in the NANDA Town skills registry</label>' +
    '<div class="row">' +
      '<button class="btn btn-ok" onclick="moderate(\'' + esc(e.id) + '\', \'approve\', this)">Approve, publish to showcase</button>' +
      '<button class="btn btn-no" onclick="moderate(\'' + esc(e.id) + '\', \'reject\', this)">Reject</button>' +
      '<span class="status" id="st-' + esc(e.id) + '"></span>' +
    '</div></div>';
}

async function loadQueue() {
  $('qcount').textContent = 'Loading queue...';
  $('list').innerHTML = '';
  try {
    const data = await apiGet('action=pending&admin_key=' + encodeURIComponent(KEY));
    $('qcount').textContent = data.count + ' pending submission' + (data.count === 1 ? '' : 's');
    $('list').innerHTML = data.pending.map(pendCard).join('') ||
      '<p style="margin-top:14px;color:var(--muted)">The queue is empty. New submissions land here.</p>';
    $('login').classList.add('hide');
    $('queue').classList.remove('hide');
    sessionStorage.setItem('nanda_admin_key', KEY);
  } catch (e) {
    $('qcount').textContent = '';
    const el = $('login').classList.contains('hide') ? $('qcount') : $('loginstatus');
    el.className = 'status err';
    el.textContent = e.message;
    if (/Invalid admin key/i.test(e.message)) logout();
  }
}

async function moderate(id, action, btn) {
  const st = $('st-' + id);
  btn.disabled = true;
  st.className = 'status'; st.textContent = action === 'approve' ? 'Publishing...' : 'Rejecting...';
  try {
    const registerInTown = action === 'approve' ? $('town-' + id).checked : false;
    const data = await apiPost({ action, id, admin_key: KEY, register_in_town: registerInTown });
    st.className = 'status ok';
    st.textContent = action === 'approve'
      ? 'Approved. Live on the showcase now.'
      : 'Rejected and removed.';
    setTimeout(() => { const el = $('pend-' + id); if (el) el.remove(); }, 1800);
  } catch (e) {
    st.className = 'status err'; st.textContent = e.message;
    btn.disabled = false;
  }
}

function logout() {
  KEY = ''; sessionStorage.removeItem('nanda_admin_key');
  $('queue').classList.add('hide');
  $('login').classList.remove('hide');
}

$('loginbtn').addEventListener('click', () => { KEY = $('key').value.trim(); if (KEY) loadQueue(); });
$('key').addEventListener('keydown', e => { if (e.key === 'Enter') $('loginbtn').click(); });
$('refreshbtn').addEventListener('click', loadQueue);
$('logoutbtn').addEventListener('click', logout);
if (KEY) loadQueue();
</script>
</body>
</html>
