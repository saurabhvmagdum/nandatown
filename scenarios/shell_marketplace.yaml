# SPDX-License-Identifier: Apache-2.0
# Shell marketplace scenario: LLM-backed buyers and sellers.
name: shell_marketplace
description: "6 LLM-backed buyers and sellers trading via shell agents (mock backend)."

tier: 2
seed: 42

agents:
  count: 6
  brain: llm
  llm_model: mock
  llm_provider: openai
  roles:
    - name: buyer
      count: 3
    - name: seller
      count: 3

layers:
  transport: in_memory
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: marketplace
  config:
    rounds: 5

failures:
  message_drop: 0.0

duration: "ticks: 3000"

metrics:
  - success_rate
  - message_count

output:
  trace: ./traces/shell_marketplace.jsonl
