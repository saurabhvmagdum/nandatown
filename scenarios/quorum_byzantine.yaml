# SPDX-License-Identifier: Apache-2.0
# Quorum consensus with Byzantine (malicious) agents — BFT 3f+1 configuration.
name: quorum_consensus
description: "1 leader and 6 followers with 2 Byzantine agents (f=2, n=3f+1=7)."

tier: 1
seed: 42

agents:
  count: 7
  brain: state-machine
  roles:
    - name: leader
      count: 1
    - name: follower
      count: 6

layers:
  transport: in_memory
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: quorum_consensus
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: quorum_consensus
  config:
    rounds: 10
    quorum: 0.667
    accept_probability: 0.8

failures:
  message_drop: 0.0
  byzantine_agents: 0.28

duration: "ticks: 20000"

metrics:
  - success_rate
  - message_count
  - agent_count

output:
  trace: ./traces/quorum_byzantine.jsonl

