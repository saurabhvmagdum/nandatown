name: saurabhvmagdum_bft_quorum_partition
description: "BFT Quorum Consensus with 7 replicas, partitioned network."
seed: 42

agents:
  count: 7
  brain: state-machine
  roles: []

layers:
  transport: in_memory
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: saurabhvmagdum_bft_quorum
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: quorum_consensus
  config:
    view_timeout_ticks: 40
    malicious_agents: []
    partition:
      start: 20
      end: 100
      group1: ["replica-0", "replica-1", "replica-2"]
      group2: ["replica-3", "replica-4", "replica-5", "replica-6"]

duration: "ticks: 200"

metrics: []
output:
  trace: ./traces/saurabhvmagdum_bft_quorum_partition.jsonl
