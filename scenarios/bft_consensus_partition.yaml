# SPDX-License-Identifier: Apache-2.0
# BFT consensus with network partition: 7 agents (f=2), 4/3 split for 30%.
name: quorum_consensus
description: "7 agents with partition 4/3 for first 30% of scenario, then heal."

tier: 1
seed: 42

agents:
  count: 7
  brain: state-machine
  roles:
    - name: leader
      count: 1
    - name: follower
      count: 6

layers:
  transport: in_memory
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: quorum_consensus
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: quorum_consensus
  config:
    rounds: 10
    quorum: 0.667
    accept_probability: 0.8

failures:
  message_drop: 0.0

duration: "ticks: 20000"

metrics:
  - success_rate
  - message_count
  - agent_count

output:
  trace: ./traces/bft_consensus_partition.jsonl
