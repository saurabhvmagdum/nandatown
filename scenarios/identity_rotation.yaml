# SPDX-License-Identifier: Apache-2.0
# Identity key-rotation scenario: signers rotate their Ed25519 key mid-run while
# 10% byzantine agents attempt post-rotation forgery and backdating attacks.
name: identity_rotation
description: "10 signers rotating Ed25519 keys once mid-run; 10% byzantine agents attempt forgery + backdating."

tier: 1
seed: 42

agents:
  count: 11
  brain: state-machine
  roles:
    # 9 honest + 1 byzantine over 10 signers = 10% byzantine (plus 1 auditor).
    - name: honest
      count: 9
    - name: byzantine
      count: 1

layers:
  transport: in_memory
  comms: nest_native
  identity: ed25519_rotating
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: identity_rotation
  config:
    rounds: 6
    rotate_at_round: 3
    byzantine_fraction: 0.10

failures:
  message_drop: 0.0

duration: "ticks: 10000"

metrics:
  - success_rate
  - message_count

output:
  trace: ./traces/identity_rotation.jsonl
