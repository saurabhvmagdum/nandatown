# SPDX-License-Identifier: Apache-2.0
# BFT consensus with Byzantine agents: 7 agents, 2 Byzantine (f=2).
name: quorum_consensus
description: "7 agents with 2 Byzantine (28%) — safety must hold."

tier: 1
seed: 42

agents:
  count: 7
  brain: state-machine
  roles:
    - name: leader
      count: 1
    - name: follower
      count: 6

layers:
  transport: in_memory
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: quorum_consensus
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: quorum_consensus
  config:
    rounds: 10
    quorum: 0.667
    accept_probability: 0.8

failures:
  message_drop: 0.0
  byzantine_agents: 0.28

duration: "ticks: 4000"

metrics:
  - message_count
  - agent_count

output:
  trace: ./traces/bft_consensus_byzantine.jsonl
