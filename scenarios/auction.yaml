# SPDX-License-Identifier: Apache-2.0
# Auction scenario: bidders compete for items.
name: auction
description: "1 auctioneer and 19 bidders competing across 5 rounds."

tier: 1
seed: 42

agents:
  count: 20
  brain: state-machine
  roles:
    - name: auctioneer
      count: 1
    - name: bidder
      count: 19

layers:
  transport: in_memory
  comms: nest_native
  identity: did_key
  registry: in_memory
  auth: jwt
  trust: score_average
  payments: prepaid_credits
  coordination: contract_net
  negotiation: alternating_offers
  memory: blackboard
  privacy: noop
  datafacts: datafacts_v1

task:
  type: auction
  config:
    rounds: 5

failures:
  message_drop: 0.0

duration: "ticks: 10000"

metrics:
  - success_rate
  - message_count
  - agent_count

output:
  trace: ./traces/auction.jsonl
