# SPDX-License-Identifier: Apache-2.0
[project]
name = "nest-cli"
version = "0.1.1"
description = "Deprecated shim — install nest-core instead. Kept on PyPI so existing installs keep working."
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 7 - Inactive",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
]
dependencies = [
    "nest-core>=0.1.2",
]

[project.optional-dependencies]
llm = ["nest-core[llm]>=0.1.2"]

# Intentionally no [project.scripts] entry: the `nest` binary is provided
# by nest-core. Installing both packages used to register conflicting
# console scripts; this shim now exposes nothing on PATH.

[project.urls]
Homepage = "https://github.com/mariagorskikh/nest"
Repository = "https://github.com/mariagorskikh/nest"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nest_cli"]
