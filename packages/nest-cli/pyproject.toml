# SPDX-License-Identifier: Apache-2.0
[project]
name = "nest-cli"
version = "0.1.0"
description = "NEST CLI: nest run, nest bench, nest inspect, and more"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "nest-core",
    "nest-sdk",
    "typer>=0.12",
]

[project.scripts]
nest = "nest_cli.main:app"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nest_cli"]
