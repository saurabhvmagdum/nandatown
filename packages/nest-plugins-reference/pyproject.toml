# SPDX-License-Identifier: Apache-2.0
[project]
name = "nest-plugins-reference"
version = "0.1.0"
description = "NEST reference plugins: default implementations for all 12 layers"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "nest-core",
    "nest-sdk",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nest_plugins_reference"]
