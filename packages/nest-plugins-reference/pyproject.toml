# SPDX-License-Identifier: Apache-2.0
[project]
name = "nest-plugins-reference"
version = "0.1.1"
description = "Nanda Town reference plugins: default implementations for the core layers"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]
dependencies = [
    "nest-core",
    "nest-sdk",
    # Real Ed25519 signing for the ed25519_rotating identity plugin
    # (RFC 8032, deterministic) and the agent_receipts trust plugin.
    # Required at runtime, so it lives in the package's hard
    # dependencies — a bare `uv sync` installs it.
    "cryptography>=42.0",
]

[project.urls]
Homepage = "https://github.com/projnanda/nandatown"
Repository = "https://github.com/projnanda/nandatown"

# Entry-point registration for the discoverable plugins shipped by this
# package. The PluginRegistry also keeps built-in defaults keyed by
# (layer, name), but declaring the entry point here is the documented,
# install-time discovery path described in CONTRIBUTING.md.
[project.entry-points."nest.plugins.comms"]
authenticated = "nest_plugins_reference.comms.authenticated:AuthenticatedComms"

[project.entry-points."nest.plugins.memory"]
lww_register = "nest_plugins_reference.memory.lww_register:LwwRegisterMemory"

[project.entry-points."nest.plugins.privacy"]
hybrid_x25519 = "nest_plugins_reference.privacy.hybrid_x25519:HybridX25519Privacy"

[project.entry-points."nest.plugins.datafacts"]
cid_facts = "nest_plugins_reference.datafacts.cid_facts:CidFacts"

[project.entry-points."nest.plugins.failure_detector"]
heartbeat = "nest_plugins_reference.failure_detection.heartbeat:HeartbeatFailureDetector"
phi_accrual = "nest_plugins_reference.failure_detection.phi_accrual:PhiAccrualFailureDetector"

[project.entry-points."nest.plugins.trust"]
parc = "nest_plugins_reference.trust.parc:ParcTrust"
aae_permit_gate = "nest_plugins_reference.trust.aae_permit_gate:AAEPermitGate"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nest_plugins_reference"]
