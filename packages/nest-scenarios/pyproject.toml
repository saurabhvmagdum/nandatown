# SPDX-License-Identifier: Apache-2.0
[project]
name = "nest-scenarios"
version = "0.1.0"
description = "NEST scenarios: reference task scenarios for agent testing"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "nest-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nest_scenarios"]
