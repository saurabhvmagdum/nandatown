# SPDX-License-Identifier: Apache-2.0
[project]
name = "nest-core"
version = "0.1.3"
description = "NEST core engine: layer interfaces, runtime, event loop, and simulator"
readme = "README.md"
requires-python = ">=3.12"
license = "Apache-2.0"
classifiers = [
    "Development Status :: 3 - Alpha",
    "License :: OSI Approved :: Apache Software License",
    "Programming Language :: Python :: 3",
    "Programming Language :: Python :: 3.12",
    "Topic :: Scientific/Engineering :: Artificial Intelligence",
    "Topic :: Software Development :: Testing",
    "Typing :: Typed",
]
dependencies = [
    "pydantic>=2.0",
    "pyyaml>=6.0",
    "typer>=0.12",
]

[project.optional-dependencies]
plugins = ["nest-plugins-reference>=0.1.0"]
llm = ["nest-shell>=0.1.0"]
full = ["nest-core[plugins,llm]"]

[project.scripts]
nest = "nest_core.cli:app"

[project.urls]
Homepage = "https://github.com/mariagorskikh/nest"
Repository = "https://github.com/mariagorskikh/nest"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nest_core"]
