# SPDX-License-Identifier: Apache-2.0
[project]
name = "nest-sdk"
version = "0.1.0"
description = "NEST SDK: public API for plugin authors"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "nest-core",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nest_sdk"]
