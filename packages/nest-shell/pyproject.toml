# SPDX-License-Identifier: Apache-2.0
[project]
name = "nest-shell"
version = "0.1.0"
description = "NEST shell: Tier 2 LLM-backed reference agent"
requires-python = ">=3.12"
license = "Apache-2.0"
dependencies = [
    "nest-core",
    "nest-sdk",
    "litellm>=1.0",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["nest_shell"]
